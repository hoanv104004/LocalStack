server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: account-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/accounts/**
        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/transactions/**
        - id: statement-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/statements/**

management:
  endpoints:
    web:
      exposure:
        include: health
